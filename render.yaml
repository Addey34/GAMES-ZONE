# Render configuration (Blueprint) — static site.
# Vite build (output in dist/), then routes so each game is served ONLY on its
# own clean URL: /typing (not /typing/typing.html).
#
# Two rule types (evaluated top to bottom, first match wins):
#   - rewrite: the URL stays /<game> in the browser, but Render serves the
#     /<game>/index.html file.
#   - redirect (301): a catch-all /* sends everything else (old .html URLs,
#     unknown paths) back to the home page /.
# IMPORTANT: Render NEVER applies a rule when a real file exists at that path
# (it serves it directly). So /* does not break assets (/assets, /css, /icons,
# /words.txt) — they are served as-is.
#
# NB: this file is NOT applied automatically (the service was created by hand).
# Mirror these same routes in the dashboard (Settings > Redirects/Rewrites),
# in the same order.
services:
  - type: web
    name: games-zone
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      # Clean URLs -> real file (the URL does not change in the address bar).
      - { type: rewrite, source: /typing, destination: /typing/index.html }
      - { type: rewrite, source: /snake, destination: /snake/index.html }
      - { type: rewrite, source: /pacman, destination: /pacman/index.html }
      - { type: rewrite, source: /2048, destination: /2048/index.html }
      - { type: rewrite, source: /tetris, destination: /tetris/index.html }
      - { type: rewrite, source: /memory, destination: /memory/index.html }
      - { type: rewrite, source: /breakout, destination: /breakout/index.html }
      - { type: rewrite, source: /pong, destination: /pong/index.html }
      - { type: rewrite, source: /ludo, destination: /ludo/index.html }
      # Everything else (old .html URLs, unknown paths) -> home.
      # LAST: the rules above take priority, and so do assets.
      - { type: redirect, source: /*, destination: / }
